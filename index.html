<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khảo sát tìm nhóm cầu lông phù hợp</title>
  <style>
    :root {
      --primary: #1e88e5;
      --bg: #f5f7fb;
      --text: #1f2937;
      --card: #ffffff;
      --border: #dbe3ee;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 24px;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(30, 136, 229, 0.08);
      overflow: hidden;
    }

    header {
      padding: 28px 28px 12px;
      background: linear-gradient(140deg, #e3f2fd, #f3f8ff);
      border-bottom: 1px solid var(--border);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.7rem;
    }

    p.desc {
      margin: 0;
      color: #42526b;
      font-size: 0.98rem;
    }

    form {
      padding: 22px 28px 28px;
      display: grid;
      gap: 18px;
    }

    fieldset {
      margin: 0;
      padding: 14px 16px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    legend {
      padding: 0 8px;
      font-weight: 600;
      color: #334155;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: 500;
    }

    input[type="text"],
    input[type="email"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      margin-top: 6px;
      padding: 10px 12px;
      border: 1px solid #c8d4e5;
      border-radius: 10px;
      font: inherit;
      background: #fff;
    }

    .options {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 400;
    }

    button {
      border: 0;
      background: var(--primary);
      color: #fff;
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      justify-self: start;
    }

    button:hover {
      background: #1565c0;
    }

    .note {
      color: #475569;
      font-size: 0.9rem;
    }

    @media (max-width: 640px) {
      body { padding: 12px; }
      header, form { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <header>
      <h1>Khảo sát tìm nhóm cầu lông phù hợp</h1>
      <p class="desc">Vui lòng điền thông tin bên dưới để hệ thống gợi ý nhóm đánh phù hợp nhất với bạn.</p>
    </header>

    <form id="surveyForm">
      <fieldset>
        <legend>Thông tin cá nhân</legend>
        <label for="name">Giới tính *</label>
        <div class="options">
          <label class="option"><input type="radio" name="frequency" value="1-2" checked /> Nam</label>
          <label class="option"><input type="radio" name="frequency" value="3-4" /> Nữ</label>
          <label class="option"><input type="radio" name="frequency" value="5+" /> Khác</label>
        </div>
        <label for="age">Năm sinh</label>
        <input id="age" name="age" type="number" min="10" max="80" placeholder="Ví dụ: 2002" />
          <label for="name">Khu vực sinh sống *</label>
        <div class="options">
          <label class="option"><input type="radio" name="frequency" value="1-2" checked /> Phường 1, 2</label>
          <label class="option"><input type="radio" name="frequency" value="3-4" /> Phường 2</label>
          <label class="option"><input type="radio" name="frequency" value="5+" /> Phường 3</label>
          <label class="option"><input type="radio" name="frequency" value="5+" /> Phường 4</label>
          <label class="option"><input type="radio" name="frequency" value="5+" /> Phường 5</label>
          <label class="option"><input type="radio" name="frequency" value="5+" /> Phường 6</label>
          <label class="option"><input type="radio" name="frequency" value="5+" /> Phường 7</label>
          <label class="option"><input type="radio" name="frequency" value="5+" /> Khác</label>
        </div>
        <label for="age">Số điện thoại / Zalo (không bắt buộc)</label>
        <input id="age" name="age" type="number" placeholder="Ví dụ: 097345333" />
      </fieldset>

      <fieldset>
        <legend>Kỹ năng & mục tiêu</legend>

        <label for="level">Bạn tự đánh giá trình độ cầu lông của mình</label>
        <div class="options">
          <label class="option"><input type="radio" name="frequency" value="1-2" checked /> Mới bắt đầu (chưa nắm luật/kỹ thuật cơ bản)</label>
          <label class="option"><input type="radio" name="frequency" value="3-4" /> Cơ bản (đánh qua lại, biết luật)</label>
          <label class="option"><input type="radio" name="frequency" value="5+" /> Trung bình (di chuyển ổn, biết đánh đôi)</label>
          <label class="option"><input type="radio" name="frequency" value="5+" /> Khá (có chiến thuật, điều cầu tốt)</label>
          <label class="option"><input type="radio" name="frequency" value="5+" /> Nâng cao (thi đấu, đánh giải)</label>
        </div>

        <label>Bạn đã chơi cầu lông bao lâu?</label>
        <div class="options">
          <label class="option"><input type="radio" name="frequency" value="1-2" checked /> Dưới 3 tháng</label>
          <label class="option"><input type="radio" name="frequency" value="3-4" /> 3–12 tháng</label>
          <label class="option"><input type="radio" name="frequency" value="5+" /> 1–3 năm</label>
          <label class="option"><input type="radio" name="frequency" value="5+" /> Trên 3 năm</label>
        </div>
        <label>Khung giờ bạn muốn chơi</label>
        <div class="options">
          <label class="option"><input type="checkbox" name="time" value="sáng" /> Buổi sáng (trước 11:00)</label>
          <label class="option"><input type="checkbox" name="time" value="chiều" /> Chiều (14:00-17:00)</label>
          <label class="option"><input type="checkbox" name="time" value="tối" /> Chiều tối (17:00-19:00)</label>
          <label class="option"><input type="checkbox" name="time" value="tối" /> Tối (sau 19:00)</label>
        </div>
        <label>Bạn có thể chơi vào ngày nào?</label>
        <div class="options">
          <label class="option"><input type="checkbox" name="time" value="sáng" /> Thứ 2 - 4 - 6</label>
          <label class="option"><input type="checkbox" name="time" value="chiều" /> Thứ 3 - 5 - 7</label>
          <label class="option"><input type="checkbox" name="time" value="tối" /> Chủ nhật</label>
        </div>
         <label>Bạn chơi cầu lông để:</label>
        <div class="options">
          <label class="option"><input type="checkbox" name="time" value="sáng" /> Giải trí, vận động</label>
          <label class="option"><input type="checkbox" name="time" value="chiều" /> Rèn luyện sức khỏe</label>
          <label class="option"><input type="checkbox" name="time" value="tối" /> Giao lưu, kết bạn</label>
          <label class="option"><input type="checkbox" name="time" value="tối" /> Nâng cao trình độ / thi đấu</label>
        </div>
        <label for="note">Ghi chú thêm</label>
        <textarea id="note" name="note" rows="4" placeholder="Ví dụ: ưu tiên khu vực trung tâm..."></textarea>
      </fieldset>
      
      <button type="submit">Gửi khảo sát</button>
      <p class="note">* Thông tin của bạn chỉ dùng để ghép nhóm cầu lông phù hợp.</p>
    </form>
  </main>

  <script>
    const form = document.getElementById('surveyForm');

    form.addEventListener('submit', function (event) {
      event.preventDefault();
      alert('Cảm ơn bạn! Khảo sát đã được ghi nhận.');
      form.reset();
    });
  </script>
</body>
</html>
